<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ABC Company</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, Segoe UI, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f4f9;
            color: #222;
        }
        .card {
            background: #fff;
            padding: 40px 36px;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 360px;
        }
        h1 { margin: 0 0 4px; font-size: 1.4rem; color: #2c3e50; }
        .sub { margin: 0 0 28px; color: #666; font-size: 0.9rem; }
        .field { margin-bottom: 16px; }
        label { display: block; font-size: 0.85rem; color: #444; margin-bottom: 6px; font-weight: 600; }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font: inherit;
            font-size: 0.95rem;
        }
        input:focus { outline: 2px solid #3498db; border-color: transparent; }
        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #2c3e50;
            color: #fff;
            border: none;
            border-radius: 6px;
            font: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        button[type="submit"]:hover { background: #3e5871; }
        .error { color: #b00020; font-size: 0.88rem; margin: 10px 0 0; }
        .demo-hint {
            margin-top: 24px;
            padding: 12px;
            background: #f0f4f8;
            border-radius: 6px;
            font-size: 0.82rem;
            color: #555;
            line-height: 1.6;
        }
        .demo-hint strong { color: #2c3e50; }
    </style>
</head>
<body>
    <div class="card">
        <h1>ABC Company</h1>
        <p class="sub">Used Car Management — sign in to continue</p>
        <form id="login-form">
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" autocomplete="username" required placeholder="your@email.com">
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" autocomplete="current-password" required>
            </div>
            <p id="error-msg" class="error" hidden></p>
            <button type="submit">Log In</button>
        </form>
        <div class="demo-hint">
            <strong>Demo admin account:</strong><br>
            Email: <code>erin.admin@abc.com</code><br>
            Password: <code>Admin@2025</code>
        </div>
    </div>
    <script>
        fetch('/api/me').then(r => { if (r.ok) location.href = '/index.html'; });

        document.getElementById('login-form').addEventListener('submit', async e => {
            e.preventDefault();
            const errEl = document.getElementById('error-msg');
            errEl.hidden = true;
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (!res.ok) {
                    errEl.textContent = data.error || 'Login failed';
                    errEl.hidden = false;
                    return;
                }
                location.href = '/index.html';
            } catch {
                errEl.textContent = 'Network error — is the server running?';
                errEl.hidden = false;
            }
        });
    </script>
</body>
</html>
