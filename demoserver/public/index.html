<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Auto Dashboard</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        .dashboard-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 800px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background-color: #2c3e50; color: white; }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <h2>Live Vehicle Inventory</h2>
        <p>Data pulled directly from the Cars database.</p>
        
        <table id="inventory-table">
            <thead>
                <tr>
                    <th>Store Name</th>
                    <th>Manager</th>
                    <th>Body Style</th>
                    <th>Available Vehicles</th>
                </tr>
            </thead>
            <tbody id="inventory-body">
                <tr><td colspan="4">Loading data...</td></tr>
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
