<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibecode Visionaries — View</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            background-color: #f4f4f9; /* Matches your index.html background */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .gif-container {
            text-align: center;
        }

        img {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: #2c3e50;
            font-family: system-ui, sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← Back to Dashboard</a>

    <div class="gif-container">
        <img src="your-gif-here.gif" alt="Featured Content">
    </div>

</body>
</html>
